name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  verify:
    runs-on: windows-latest
    strategy:
      matrix:
        node-version: [22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest run

      - name: Build
        run: npx vite build

      - name: Verify build output
        run: |
          if (-not (Test-Path "dist/index.html")) {
            throw "Build output missing: dist/index.html"
          }
          Write-Output "Build output verified: dist/index.html ($((Get-Item dist/index.html).Length) bytes)"
